<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayat Paskah</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1b2b;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.visual{
  display:flex;
  gap:4px;
  justify-content:center;
  margin:15px 0;
}

.bar{
  width:5px;
  height:15px;
  background:gold;
}
</style>
</head>

<body>

<div class="card">
  <h2>Ayat Paskah</h2>

  <input type="text" id="nama" placeholder="Masukkan nama">
  <button onclick="ambilAyat()">Lihat Ayat</button>

  <div class="visual">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <p id="text"></p>
  <p id="ref"></p>
</div>

<button id="musicBtn" style="position:fixed;bottom:20px;right:20px;">🔊</button>

<audio id="bgMusic" loop preload="auto" muted>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5e7c4d8f3c.mp3?filename=heavenly-ambient-110624.mp3" type="audio/mpeg">
</audio>

<script>
const ayatList = [
{ text:"Karena begitu besar kasih Allah akan dunia ini...", ref:"Yohanes 3:16"},
{ text:"Akulah kebangkitan dan hidup...", ref:"Yohanes 11:25"},
{ text:"Ia telah bangkit.", ref:"Matius 28:6"}
];

function ambilAyat(){
  const nama = document.getElementById("nama").value;
  const random = ayatList[Math.floor(Math.random()*ayatList.length)];
  document.getElementById("text").innerText = nama + ": " + random.text;
  document.getElementById("ref").innerText = random.ref;
}

const audio = document.getElementById("bgMusic");
const bars = document.querySelectorAll(".bar");
const btn = document.getElementById("musicBtn");

let ctx, analyser, dataArray, isPlaying=false;

function setup(){
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 32;

  const source = ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(ctx.destination);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

function animate(){
  analyser.getByteFrequencyData(dataArray);

  bars.forEach((bar,i)=>{
    let val = dataArray[i];
    bar.style.height = (10 + val/5) + "px";
  });

  requestAnimationFrame(animate);
}

async function playMusic(){
  if(!ctx) setup();

  if(ctx.state==="suspended") await ctx.resume();

  if(!isPlaying){
    await audio.play();
    audio.muted = false;
    isPlaying = true;
    btn.innerText="🔇";
    animate();
  }else{
    audio.pause();
    isPlaying = false;
    btn.innerText="🔊";
  }
}

btn.onclick = playMusic;

// autoplay setelah klik pertama
document.body.addEventListener("click", playMusic, { once:true });

// error handler
audio.addEventListener("error", ()=>{
  alert("Audio gagal dimuat, cek link mp3");
});
</script>

</body>
</html>
